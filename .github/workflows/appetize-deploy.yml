name: Build & Deploy to Appetize.io

on:
  push:
    branches: [main, develop]
    paths:
      - '**.swift'
      - '**.plist'
      - '**.xcassets/**'
      - '**.rar'
      - '.github/workflows/appetize-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build iOS (Simulator) -> Appetize
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Extract WholesaleConnect.rar
        run: |
          brew install unar
          unar -o . WholesaleConnect.rar
          echo "Extracted contents:"
          ls -la WholesaleConnect/
          cp -R WholesaleConnect/App ./App
          cp -R WholesaleConnect/Core ./Core
          cp -R WholesaleConnect/Features ./Features
          cp -R WholesaleConnect/Shared ./Shared
          cp -R WholesaleConnect/Resources ./Resources
          echo "Source folders ready"
          ls -la

      - name: Generate Xcode project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project WholesaleConnect.xcodeproj \
            -scheme WholesaleConnect \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Zip .app for Appetize
        run: |
          APP_PATH=$(find ./DerivedData -name "WholesaleConnect.app" -not -path "*/Index*" | head -1)
          echo "Found app at: $APP_PATH"
          zip -r WholesaleConnect-Simulator.zip "$APP_PATH"
          ls -lh WholesaleConnect-Simulator.zip

      - name: Deploy to Appetize.io
        id: appetize
        run: |
          if [ -n "${{ secrets.APPETIZE_PUBLIC_KEY }}" ]; then
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/${{ secrets.APPETIZE_PUBLIC_KEY }}" \
              -u "${{ secrets.APPETIZE_API_TOKEN }}:" \
              -F "file=@WholesaleConnect-Simulator.zip" \
              -F "platform=ios" \
              -F "note=Build ${{ github.sha }}")
          else
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps" \
              -u "${{ secrets.APPETIZE_API_TOKEN }}:" \
              -F "file=@WholesaleConnect-Simulator.zip" \
              -F "platform=ios" \
              -F "note=Build ${{ github.sha }}")
          fi
          PUBLIC_KEY=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey',''))")
          echo "appetize_public_key=$PUBLIC_KEY" >> $GITHUB_OUTPUT
          echo "Preview URL: https://appetize.io/app/$PUBLIC_KEY"

      - name: Post preview URL to job summary
        run: |
          echo "## iOS Preview Ready" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** `${{ github.ref_name }}`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** `${{ github.sha }}`" >> $GITHUB_STEP_SUMMARY
          echo "### [Open in Appetize.io](https://appetize.io/app/${{ steps.appetize.outputs.appetize_public_key }})" >> $GITHUB_STEP_SUMMARY
          echo "**Appetize Public Key:** `${{ steps.appetize.outputs.appetize_public_key }}`" >> $GITHUB_STEP_SUMMARY
